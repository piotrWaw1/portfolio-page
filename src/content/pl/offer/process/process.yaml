title: Jak pracujemy
description: >-
  Przejrzysty, oparty na współpracy proces. Od pierwszej rozmowy aż po finalne
  wdrożenie. Jesteś zaangażowany na każdym etapie i nic Cię nie zaskoczy.
services:
  - title: Odkrywanie i Planowanie
    description: >-
      Zaczynamy od rozmowy. Zrozumienie Twoich celów, odbiorców i wymagań
      pozwala nam zaplanować idealne rozwiązanie, harmonogram oraz stos
      technologiczny dla Twojego projektu.
  - title: Projekt i Prototypowanie
    description: >-
      Tworzymy makiety oraz szczegółowe projekty graficzne do Twojej akceptacji.
      Widzisz dokładnie, jak strona będzie wyglądać i działać, zanim powstanie
      choćby jedna linijka kodu.
  - title: Development i Testowanie
    description: >-
      Tworzymy Twoją stronę w nowoczesnym, czystym kodzie. Każdą funkcję
      testujemy na różnych urządzeniach i przeglądarkach, by działała bez
      zarzutu dla wszystkich użytkowników.
  - title: Wdrożenie i Wsparcie
    description: >-
      Zajmujemy się wdrożeniem, optymalizacją wydajności oraz wsparciem po
      uruchomieniu. Twoja strona szybko trafia do sieci i działa płynnie dzięki
      stałej opiece technicznej.
